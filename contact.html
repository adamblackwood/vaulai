<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | GoalPulse</title>
    <meta name="description" content="Get in touch with the GoalPulse team for partnership inquiries, support, or betting tips submissions.">
    
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="assets/js/tracking.js"></script>
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="container nav">
            <a href="/" class="logo">Goal<span>Pulse</span> ⚽</a>
            <ul class="nav-links" id="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
                <li><a href="privacy.html">Privacy</a></li>
            </ul>
            <div class="menu-toggle" id="menu-toggle">
                <span></span><span></span><span></span>
            </div>
        </div>
    </header>

    <!-- Contact Content -->
    <section class="section">
        <div class="container" style="max-width: 600px;">
            <div class="fade-in">
                <h1 style="font-size: 2.5rem; margin-bottom: 20px;">Contact Us</h1>
                <p style="color: var(--text-secondary); margin-bottom: 30px;">
                    Have a question, a partnership proposal, or want to submit your own betting tips? Fill out the form below and our team will get back to you within 24 hours.
                </p>
            </div>

            <form class="fade-in" style="display: flex; flex-direction: column; gap: 20px;">
                <div>
                    <label style="display: block; margin-bottom: 8px; font-weight: 500;">Full Name</label>
                    <input type="text" placeholder="John Doe" required style="width: 100%; padding: 12px; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius); color: var(--text-primary); font-family: var(--font-main);">
                </div>
                <div>
                    <label style="display: block; margin-bottom: 8px; font-weight: 500;">Email Address</label>
                    <input type="email" placeholder="john@example.com" required style="width: 100%; padding: 12px; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius); color: var(--text-primary); font-family: var(--font-main);">
                </div>
                <div>
                    <label style="display: block; margin-bottom: 8px; font-weight: 500;">Subject</label>
                    <input type="text" placeholder="Partnership Inquiry" required style="width: 100%; padding: 12px; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius); color: var(--text-primary); font-family: var(--font-main);">
                </div>
                <div>
                    <label style="display: block; margin-bottom: 8px; font-weight: 500;">Message</label>
                    <textarea rows="6" placeholder="Tell us what's on your mind..." required style="width: 100%; padding: 12px; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius); color: var(--text-primary); font-family: var(--font-main); resize: vertical;"></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="align-self: flex-start;">Send Message</button>
            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 GoalPulse. All rights reserved. | <a href="privacy.html">Privacy Policy</a></p>
        </div>
    </footer>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/ads.js"></script>

    <!-- Social Bar Placeholder -->
    <div class="ad-placeholder" data-ad-type="social-bar"></div>
</body>
</html>
